<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admission IoTE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="/css/4admission.css">

</head>

<body>

    <!-- HEADER LOAD -->
    <div id="header"></div>

    <script>
        fetch("../header.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("header").innerHTML = data;
            });
    </script>
    <!-- HEADER SCRIPT -->
    <script src="../js/header.js"></script>

    <!-- MAIN SCRIPT -->
    <script src="../student-services/function.js"></script>



        <!-- ================= BANNER ================= -->
        <section class="banner portfolio-banner" data-aos="fade-up">
            <div class="banner-overlay"></div>
            <div class="banner-content">
                <h1 data-aos="fade-up" data-aos-delay="200">PORTFOLIO</h1>
                <p data-aos="fade-up" data-aos-delay="400">รับสมัคร 75 คน</p>
            </div>
        </section>

        <!-- ================= PORTFOLIO SLIDER ================= -->
        <section class="portfolio-section">

            <button class="nav-btn" onclick="prevSlide()" data-aos="fade-right" data-aos-delay="200">❮</button>

            <div class="portfolio-card" id="portfolioCard" data-aos="zoom-in" data-aos-delay="300">

                <h2 id="title"></h2>

                <p class="title">จำนวนรับ</p>
                <p id="amount"></p>

                <p class="title">คุณสมบัติ</p>
                <ul id="desc"></ul>

                <p class="title">รายละเอียดเพิ่มเติม</p>
                <a id="link" href="#" target="_blank"></a>
            </div>

            <button class="nav-btn" onclick="nextSlide()" data-aos="fade-left" data-aos-delay="200">❯</button>

        </section>

        <div class="dots" id="dots" data-aos="fade-up" data-aos-delay="400"></div>

        <!-- ================= SCRIPT ================= -->
        <script>
            function toggleMenu() {
                document.getElementById("menu").classList.toggle("show");
            }

            document.querySelectorAll('.menu a').forEach(item => {
                item.addEventListener('click', function () {
                    document.querySelectorAll('.menu .active').forEach(el => {
                        el.classList.remove('active');
                    });
                    this.classList.add('active');
                });
            });

                    ],
                    link: "https://new.reg.kmitl.ac.th/admission/#/"
                },

                        "เป็นผู้ที่มีผลงาน รางวัล หรือประกาศนียบัตร"
                    ],
                    link: "https://new.reg.kmitl.ac.th/admission/#/"
                },
                {
                    title: "โครงการโรงเรียนวิทยาศาสตร์",

                    desc: [

                        "รับผู้สมัครที่จบจาก รร. หลักสูตรนานาชาติ",
                        "รับผู้สมัครที่จบจาก รร. หลักสูตรอาชีวะศึกษา",
                        "ผู้สมัครจะต้องมีผลการเรียนเฉลี่ยสะสมรวมอย่างน้อย 5 ภาคการศึกษา ไม่น้อยกว่า 3.00",
                        "เป็นผู้ที่กำลังศึกษาระดับชั้นมัธยมศึกษาปีที่ 6 (สายวิทยาศาสตร์ – คณิตศาสตร์)ในโรงเรียนวิทยาศาสตร์ หรือโรงเรียนที่มีโครงการห้องเรียนพิเศษด้านวิทยาศาสตร์ คณิตศาสตร์ หรือโรงเรียนที่มีการจัดการเรียนสอนให้แก่ผู้มีความสามารถ พิเศษด้านคณิตศาสตร์และวิทยาศาสตร์"

                    ],
                    link: "https://new.reg.kmitl.ac.th/admission/#/"
                },
                {
                    title: "โครงการ Engineer Pathway",
                    amount: "30 คน (รับร่วมกัน)",
                    desc: [
                        "รับผู้สมัครที่จบจาก รร. หลักสูตรแกนกลาง",
                        "รับผู้สมัครที่จบจาก รร. หลักสูตรนานาชาติ",

                },
                {
                    title: "โครงการ สอวน.",
                    amount: "40 คน (รวมทุกหลักสูตร)",
                    desc: [

                        "รับผู้สมัครที่จบจาก รร. หลักสูตรนานาชาติ",
                        "สำเร็จการศึกษาหรือกำลังศึกษาระดับชั้นมัธยมศึกษาปีที่ 6 (สายวิทยาศาสตร์ – คณิตศาสตร์และแผนการเรียนศิลป์ – คำนวณ)",

                        "เป็นผู้สำเร็จการอบรมค่าย 2 ของมูลนิธิ สอวน."

                    ],
                    link: "https://new.reg.kmitl.ac.th/admission/#/"
                },
                {
                    title: "โครงการบุตรของบุคลากรสถาบันเทคโนโลยีพระจอมเกล้าเจ้าคุณทหารลาดกระบัง",
                    amount: "5 คน (รวมทุกหลักสูตร)",
                    desc: [
                        "รับผู้สมัครที่จบจาก รร. หลักสูตรแกนกลาง",
                        "รับผู้สมัครที่จบจาก รร. หลักสูตรนานาชาติ",
                        "เป็นผู้ที่กำลังศึกษาระดับชั้นมัธยมศึกษาปีที่ 6 (สายวิทยาศาสตร์ – คณิตศาสตร์) ",
                        "ผู้สมัครต้องมีผลการเรียนเฉลี่ยสะสมรวมอย่างน้อย 5 ภาคการศึกษา ไม่น้อยกว่า 2.75",
                        "เป็นผู้ไม่มีโรคสำคัญที่เป็นอุปสรรคต่อการศึกษา",
                        "ผู้สมัครต้องเป็นบุตรโดยชอบด้วยกฎหมายของพนักงานสถาบัน ข้าราชการ หรือลูกจ้างประจำของสถาบันเทคโนโลยีพระจอมเกล้าเจ้าคุณทหารลาดกระบังเท่านั้น ซึ่งยกเว้นบุตรบุญธรรม"

                    ],
                    link: "https://new.reg.kmitl.ac.th/admission/#/"
                }

            ];
            let current = 0;

            function showSlide(index) {

                const card = document.getElementById("portfolioCard");

                // reset animation
                card.classList.remove("aos-animate");
                void card.offsetWidth;

                document.getElementById("title").innerText = slides[index].title;
                document.getElementById("amount").innerText = slides[index].amount;

                const descList = document.getElementById("desc");
                descList.innerHTML = "";

                slides[index].desc.forEach(item => {
                    const li = document.createElement("li");
                    li.innerText = item;
                    descList.appendChild(li);
                });

                const link = document.getElementById("link");
                link.href = slides[index].link;
                link.innerText = slides[index].link;

                updateDots();

                // trigger animation ใหม่
                setTimeout(() => {
                    card.classList.add("aos-animate");
                }, 50);
            }

            function nextSlide() {
                current = (current + 1) % slides.length;
                showSlide(current);
            }

            function prevSlide() {
                current = (current - 1 + slides.length) % slides.length;
                showSlide(current);
            }

            function updateDots() {
                const dotsContainer = document.getElementById("dots");
                dotsContainer.innerHTML = "";

                slides.forEach((_, i) => {
                    const dot = document.createElement("span");
                    if (i === current) dot.classList.add("active");
                    dot.onclick = () => { current = i; showSlide(i); };
                    dotsContainer.appendChild(dot);
                });
            }

            showSlide(current);
        </script>

        <!-- AOS JS -->
        <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

        <script>
            AOS.init({
                duration: 1000,
                once: true,
                easing: 'ease-in-out',
                offset: 100
            });
        </script>

    </body>

</html>
